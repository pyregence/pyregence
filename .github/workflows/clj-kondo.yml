name: clj-kondo linter

on:
  pull_request:
    branches:
      - main

jobs:
  clj-lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: DeLaGuardo/setup-clj-kondo@master
      with:
        version: '2026.05.25'
    - run: clj-kondo --lint src --fail-level error
